<svg viewBox="0 0 860 240" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="iocx — IOC triage at terminal speed">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&amp;display=swap');
      .mono { font-family: 'JetBrains Mono', 'Courier New', monospace; }
      .scan { animation: scan 5s linear infinite; }
      @keyframes scan {
        0%   { transform: translateY(-40px); opacity: 0; }
        8%   { opacity: 1; }
        92%  { opacity: 1; }
        100% { transform: translateY(280px); opacity: 0; }
      }
      .flow { stroke-dasharray: 860; stroke-dashoffset: 860; animation: flow 1.4s ease forwards 0.1s; }
      @keyframes flow { to { stroke-dashoffset: 0; } }
      .btl { stroke-dasharray: 80; stroke-dashoffset: 80; animation: draw 0.5s ease forwards 0.3s; }
      .btr { stroke-dasharray: 80; stroke-dashoffset: 80; animation: draw 0.5s ease forwards 0.5s; }
      .bbl { stroke-dasharray: 80; stroke-dashoffset: 80; animation: draw 0.5s ease forwards 0.7s; }
      .bbr { stroke-dasharray: 80; stroke-dashoffset: 80; animation: draw 0.5s ease forwards 0.9s; }
      @keyframes draw { to { stroke-dashoffset: 0; } }
      .varl { stroke-dasharray: 160; stroke-dashoffset: 160; animation: draw 1s ease forwards 0.5s; }
      .varr { stroke-dasharray: 160; stroke-dashoffset: 160; animation: draw 1s ease forwards 0.7s; }
      .t0 { opacity: 0; animation: up 0.45s ease forwards 0.55s; }
      .t1 { opacity: 0; animation: up 0.45s ease forwards 0.8s; }
      .t2 { opacity: 0; animation: up 0.45s ease forwards 1.0s; }
      .t3 { opacity: 0; animation: up 0.45s ease forwards 1.2s; }
      .t4 { opacity: 0; animation: up 0.45s ease forwards 1.4s; }
      .t5 { opacity: 0; animation: up 0.45s ease forwards 1.6s; }
      .t6 { opacity: 0; animation: up 0.45s ease forwards 1.8s; }
      @keyframes up {
        from { opacity: 0; transform: translateY(10px); }
        to   { opacity: 1; transform: translateY(0); }
      }
      .glow { animation: glow 3s ease-in-out infinite alternate; }
      @keyframes glow {
        from { filter: drop-shadow(0 0 10px #7C3AEDaa) drop-shadow(0 0 25px #7C3AED44); }
        to   { filter: drop-shadow(0 0 14px #06B6D4cc) drop-shadow(0 0 35px #06B6D466); }
      }
      .w1 { animation: wav 1.8s ease-in-out infinite; transform-origin: center bottom; }
      .w2 { animation: wav 2.3s ease-in-out infinite 0.2s; transform-origin: center bottom; }
      .w3 { animation: wav 1.6s ease-in-out infinite 0.4s; transform-origin: center bottom; }
      .w4 { animation: wav 2.9s ease-in-out infinite 0.1s; transform-origin: center bottom; }
      .w5 { animation: wav 2.0s ease-in-out infinite 0.6s; transform-origin: center bottom; }
      .w6 { animation: wav 2.5s ease-in-out infinite 0.3s; transform-origin: center bottom; }
      .w7 { animation: wav 1.7s ease-in-out infinite 0.8s; transform-origin: center bottom; }
      @keyframes wav {
        0%,100% { transform: scaleY(1); opacity: 0.55; }
        50%     { transform: scaleY(2.2); opacity: 1; }
      }
      .p1 { animation: f1 7s ease-in-out infinite; }
      .p2 { animation: f2 9s ease-in-out infinite 1s; }
      .p3 { animation: f1 6s ease-in-out infinite 2s; }
      .p4 { animation: f2 8s ease-in-out infinite 0.5s; }
      .p5 { animation: f1 10s ease-in-out infinite 3s; }
      .p6 { animation: f2 7s ease-in-out infinite 1.5s; }
      .p7 { animation: f1 8s ease-in-out infinite 2.5s; }
      @keyframes f1 { 0%,100%{transform:translateY(0);opacity:.25} 50%{transform:translateY(-12px);opacity:.9} }
      @keyframes f2 { 0%,100%{transform:translateY(0);opacity:.2} 50%{transform:translateY(-16px);opacity:.85} }
      .b1 { animation: blink 2.2s step-end infinite; }
      .b2 { animation: blink 2.2s step-end infinite 0.7s; }
      .b3 { animation: blink 2.2s step-end infinite 1.4s; }
      @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.15} }
      .tag { animation: tpulse 4s ease-in-out infinite alternate; }
      @keyframes tpulse { from{opacity:.6} to{opacity:1} }
    </style>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#020810"/>
      <stop offset="100%" stop-color="#03091a"/>
    </linearGradient>
    <linearGradient id="titlegrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#a78bfa"/>
      <stop offset="45%"  stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#06B6D4"/>
    </linearGradient>
    <linearGradient id="flowg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#7C3AED" stop-opacity="0"/>
      <stop offset="30%"  stop-color="#7C3AED"/>
      <stop offset="70%"  stop-color="#06B6D4"/>
      <stop offset="100%" stop-color="#06B6D4" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="scang" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#06B6D4" stop-opacity="0"/>
      <stop offset="50%"  stop-color="#06B6D4" stop-opacity="0.09"/>
      <stop offset="100%" stop-color="#06B6D4" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="wg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#06B6D4" stop-opacity="0.4"/>
    </linearGradient>
    <linearGradient id="wgr" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#06B6D4"/>
      <stop offset="100%" stop-color="#7C3AED" stop-opacity="0.4"/>
    </linearGradient>
  </defs>

  <rect width="860" height="240" fill="url(#bg)" rx="4"/>

  <!-- Grid -->
  <g opacity="0.22" stroke="#0d1f3c" stroke-width="1">
    <line x1="0" y1="48"  x2="860" y2="48"/>
    <line x1="0" y1="96"  x2="860" y2="96"/>
    <line x1="0" y1="144" x2="860" y2="144"/>
    <line x1="0" y1="192" x2="860" y2="192"/>
    <line x1="43"  y1="0" x2="43"  y2="240"/>
    <line x1="86"  y1="0" x2="86"  y2="240"/>
    <line x1="129" y1="0" x2="129" y2="240"/>
    <line x1="172" y1="0" x2="172" y2="240"/>
    <line x1="215" y1="0" x2="215" y2="240"/>
    <line x1="258" y1="0" x2="258" y2="240"/>
    <line x1="301" y1="0" x2="301" y2="240"/>
    <line x1="344" y1="0" x2="344" y2="240"/>
    <line x1="387" y1="0" x2="387" y2="240"/>
    <line x1="430" y1="0" x2="430" y2="240"/>
    <line x1="473" y1="0" x2="473" y2="240"/>
    <line x1="516" y1="0" x2="516" y2="240"/>
    <line x1="559" y1="0" x2="559" y2="240"/>
    <line x1="602" y1="0" x2="602" y2="240"/>
    <line x1="645" y1="0" x2="645" y2="240"/>
    <line x1="688" y1="0" x2="688" y2="240"/>
    <line x1="731" y1="0" x2="731" y2="240"/>
    <line x1="774" y1="0" x2="774" y2="240"/>
    <line x1="817" y1="0" x2="817" y2="240"/>
  </g>

  <rect class="scan" x="0" y="0" width="860" height="50" fill="url(#scang)"/>
  <line class="flow" x1="0" y1="3" x2="860" y2="3" stroke="url(#flowg)" stroke-width="2.5"/>
  <line class="varl" x1="22" y1="25" x2="22" y2="185" stroke="#7C3AED" stroke-width="2.5" stroke-linecap="round"/>
  <line class="varr" x1="838" y1="25" x2="838" y2="185" stroke="#06B6D4" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Corner brackets -->
  <path class="btl" d="M 18 32 L 18 12 L 38 12" fill="none" stroke="#7C3AED" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <path class="btr" d="M 842 32 L 842 12 L 822 12" fill="none" stroke="#7C3AED" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <path class="bbl" d="M 18 208 L 18 228 L 38 228" fill="none" stroke="#06B6D4" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <path class="bbr" d="M 842 208 L 842 228 L 822 228" fill="none" stroke="#06B6D4" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Left waveform -->
  <g transform="translate(34, 135)">
    <rect class="w1" x="0"  y="-18" width="4" height="36" fill="url(#wg)" rx="2"/>
    <rect class="w2" x="8"  y="-30" width="4" height="60" fill="url(#wg)" rx="2"/>
    <rect class="w3" x="16" y="-12" width="4" height="24" fill="url(#wg)" rx="2"/>
    <rect class="w4" x="24" y="-38" width="4" height="76" fill="url(#wg)" rx="2"/>
    <rect class="w5" x="32" y="-22" width="4" height="44" fill="url(#wg)" rx="2"/>
    <rect class="w6" x="40" y="-14" width="4" height="28" fill="url(#wg)" rx="2"/>
    <rect class="w7" x="48" y="-26" width="4" height="52" fill="url(#wg)" rx="2"/>
  </g>

  <!-- Right waveform -->
  <g transform="translate(774, 135)">
    <rect class="w4" x="0"  y="-24" width="4" height="48" fill="url(#wgr)" rx="2"/>
    <rect class="w1" x="8"  y="-14" width="4" height="28" fill="url(#wgr)" rx="2"/>
    <rect class="w5" x="16" y="-34" width="4" height="68" fill="url(#wgr)" rx="2"/>
    <rect class="w2" x="24" y="-20" width="4" height="40" fill="url(#wgr)" rx="2"/>
    <rect class="w6" x="32" y="-28" width="4" height="56" fill="url(#wgr)" rx="2"/>
    <rect class="w3" x="40" y="-12" width="4" height="24" fill="url(#wgr)" rx="2"/>
    <rect class="w7" x="48" y="-18" width="4" height="36" fill="url(#wgr)" rx="2"/>
  </g>

  <!-- Particles -->
  <circle class="p1" cx="12" cy="65"  r="2"   fill="#7C3AED" opacity="0.7"/>
  <circle class="p2" cx="16" cy="110" r="1.5" fill="#06B6D4" opacity="0.6"/>
  <circle class="p3" cx="10" cy="158" r="2.5" fill="#7C3AED" opacity="0.45"/>
  <circle class="p7" cx="14" cy="200" r="1.5" fill="#06B6D4" opacity="0.5"/>
  <circle class="p4" cx="848" cy="60"  r="1.5" fill="#06B6D4" opacity="0.6"/>
  <circle class="p5" cx="845" cy="115" r="2.5" fill="#7C3AED" opacity="0.5"/>
  <circle class="p6" cx="850" cy="165" r="2"   fill="#06B6D4" opacity="0.65"/>
  <circle class="p1" cx="847" cy="205" r="1.5" fill="#7C3AED" opacity="0.45"/>

  <!-- Status dots -->
  <circle class="b1" cx="96" cy="20" r="3.5" fill="#22C55E"/>
  <circle class="b2" cx="112" cy="20" r="3.5" fill="#22C55E"/>
  <circle class="b3" cx="128" cy="20" r="3.5" fill="#22C55E"/>

  <!-- Prompt -->
  <text class="t0 mono" x="96"  y="54" fill="#475569" font-size="11">~/tools/iocx</text>
  <text class="t0 mono" x="210" y="54" fill="#7C3AED" font-size="11">$</text>
  <text class="t0 mono" x="224" y="54" fill="#22C55E" font-size="11">iocx scan hosts.txt --output report.html</text>

  <!-- Title -->
  <g class="glow t1">
    <text class="mono" x="96" y="128" fill="url(#titlegrad)" font-size="68" font-weight="800" letter-spacing="-1.5">iocx</text>
  </g>

  <!-- Subtitle -->
  <text class="t2 mono" x="96" y="154" fill="#94A3B8" font-size="12.5" letter-spacing="0.3">Security Analyst · SOC Tier 1 · VAR Group Madrid</text>
  <text class="t3 mono" x="96" y="171" fill="#475569" font-size="11" letter-spacing="0.2">IOC triage at terminal speed  ·  IP · domain · hash · url · decode · report</text>

  <!-- Divider -->
  <line class="t4" x1="96" y1="186" x2="820" y2="186" stroke="#7C3AED" stroke-width="1" opacity="0.3"/>

  <!-- Tags -->
  <g class="t5 tag mono" font-size="11">
    <rect x="96"  y="196" width="88"  height="22" rx="11" fill="none" stroke="#7C3AED" stroke-width="1.2" opacity="0.85"/>
    <circle cx="113" cy="207" r="4.5" fill="#7C3AED"/>
    <text x="123" y="211" fill="#E6EDF3">VirusTotal</text>

    <rect x="194" y="196" width="88"  height="22" rx="11" fill="none" stroke="#06B6D4" stroke-width="1.2" opacity="0.85"/>
    <circle cx="211" cy="207" r="4.5" fill="#06B6D4"/>
    <text x="221" y="211" fill="#E6EDF3">AbuseIPDB</text>

    <rect x="292" y="196" width="74"  height="22" rx="11" fill="none" stroke="#22C55E" stroke-width="1.2" opacity="0.85"/>
    <circle cx="309" cy="207" r="4.5" fill="#22C55E"/>
    <text x="319" y="211" fill="#E6EDF3">Shodan</text>

    <rect x="376" y="196" width="122" height="22" rx="11" fill="none" stroke="#7C3AED" stroke-width="1.2" opacity="0.85"/>
    <circle cx="393" cy="207" r="4.5" fill="#7C3AED"/>
    <text x="403" y="211" fill="#E6EDF3">MalwareBazaar</text>

    <rect x="508" y="196" width="78"  height="22" rx="11" fill="none" stroke="#06B6D4" stroke-width="1.2" opacity="0.85"/>
    <circle cx="525" cy="207" r="4.5" fill="#06B6D4"/>
    <text x="535" y="211" fill="#E6EDF3">URLhaus</text>

    <rect x="596" y="196" width="94"  height="22" rx="11" fill="none" stroke="#22C55E" stroke-width="1.2" opacity="0.85"/>
    <circle cx="613" cy="207" r="4.5" fill="#22C55E"/>
    <text x="623" y="211" fill="#E6EDF3">HTML Report</text>
  </g>

  <!-- Bottom tagline -->
  <g class="t6 mono">
    <circle cx="96"  cy="231" r="3" fill="#7C3AED" opacity="0.8"/>
    <circle cx="108" cy="231" r="3" fill="#06B6D4" opacity="0.8"/>
    <circle cx="120" cy="231" r="3" fill="#22C55E" opacity="0.8"/>
    <text x="136" y="235" fill="#475569" font-size="10.5" letter-spacing="0.3">find it  //  triage it  //  chase the fix</text>
  </g>
</svg>
